[keyboard]
name = "rmk-sweep"
product_name = "rmk-sweep"
vendor_id = 0x4c4b
product_id = 0x4643
manufacturer = "RMK"
chip = "nrf52840"

[layout]
# WARNING: Currently row2col/col2row is set in RMK's feature gate, row2col config here is valid ONLY when you're using cloud compilation.
# Checkout doc here: https://rmk.rs/docs/user_guide/faq.html#my-matrix-is-row2col-the-matrix-doesn-t-work
# row2col = true
rows = 8
cols = 5
layers = 4
matrix_map = """
    (0,0) (0,1) (0,2) (0,3) (0,4)  (4,4) (4,3) (4,2) (4,1) (4,0)
    (1,0) (1,1) (1,2) (1,3) (1,4)  (5,4) (5,3) (5,2) (5,1) (5,0)
    (2,0) (2,1) (2,2) (2,3) (2,4)  (6,4) (6,3) (6,2) (6,1) (6,0)
                      (3,0) (3,1)  (7,1) (7,0)
"""

[aliases]
bt0 = "User0"
bt1 = "User1"
bt2 = "User2"
bt_next = "User3"
bt_prev = "User4"
bt_clr = "User5"
usb_ble = "User6"

[[layer]]
name = "base"
keys = """
Q W E R T Y U I O P
A S D F G H J K L Enter
MT(Z, LShift) X C V B N M Comma Dot MT(Slash, RShift)
LCtrl MO(1) Space Backspace
"""

[[layer]]
name = "upper"
keys = """
Kc1 Kc2 Kc3 Kc4 Kc5 Kc6 Kc7 Kc8 Kc9 Kc0
Grave No OSL(3) OSL(2) No No Minus Equal LeftBracket RightBracket
LShift LCtrl LAlt LGui No No RGui MT(Semicolon, RAlt) MT(Quote, RCtrl) MT(Backslash, RShift)
_ _ Tab Escape
"""

[[layer]]
name = "lower"
keys = """
F1 F2 F3 F4 F5 F6 F7 F8 F9 F10
F11 F12 PrintScreen ScrollLock Pause Left Down Up Right CapsLock
LShift LCtrl LAlt LGui No Home PageDown PageUp End RShift
_ _ Insert Delete
"""

[[layer]]
name = "adjust"
keys = """
@bt0 @bt1 @bt2 @bt_clr @usb_ble No MediaPrevTrack MediaPlayPause MediaNextTrack AudioMute
AudioVolDown AudioVolUp No No No MouseLeft MouseDown MouseUp MouseRight No
LShift LCtrl LAlt LGui No No MouseWheelUp MouseWheelDown No RShift
_ _ MouseBtn1 MouseBtn2
"""

[ble]
enabled = true

[split]
connection = "ble"

[split.central]
rows = 4
cols = 5
row_offset = 0
col_offset = 0
[split.central.matrix]
matrix_type = "direct_pin"
direct_pin_low_active = true
direct_pins = [
    ["P0_09", "P0_02", "P0_29", "P0_31", "P0_30"],
    ["P1_13", "P0_03", "P0_28", "P1_11", "P0_06"],
    ["P0_15", "P0_17", "P0_20", "P0_13", "P0_24"],
    ["P0_10", "P1_06", "_", "_", "_" ]
]

[[split.peripheral]]
rows = 4
cols = 5
row_offset = 4
col_offset = 0

[split.peripheral.matrix]
matrix_type = "direct_pin"
direct_pin_low_active = true
direct_pins = [
    ["P0_09", "P0_02", "P0_29", "P0_31", "P0_30"],
    ["P1_13", "P0_03", "P0_28", "P1_11", "P0_06"],
    ["P0_15", "P0_17", "P0_20", "P0_13", "P0_24"],
    ["P0_10", "P1_06", "_", "_", "_" ]
]
