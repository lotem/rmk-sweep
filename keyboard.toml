[keyboard]
name = "rmk-sweep"
product_name = "rmk-sweep"
vendor_id = 0x4c4b
product_id = 0x4643
manufacturer = "RMK"
chip = "nrf52840"

[layout]
# WARNING: Currently row2col/col2row is set in RMK's feature gate, row2col config here is valid ONLY when you're using cloud compilation.
# Checkout doc here: https://rmk.rs/docs/user_guide/faq.html#my-matrix-is-row2col-the-matrix-doesn-t-work
# row2col = true
rows = 8
cols = 5
layers = 4
matrix_map = """
    (0,0) (0,1) (0,2) (0,3) (0,4)  (4,4) (4,3) (4,2) (4,1) (4,0)
    (1,0) (1,1) (1,2) (1,3) (1,4)  (5,4) (5,3) (5,2) (5,1) (5,0)
    (2,0) (2,1) (2,2) (2,3) (2,4)  (6,4) (6,3) (6,2) (6,1) (6,0)
                      (3,0) (3,1)  (7,1) (7,0)
"""

[aliases]
upper = "MO(upper)"
lower = "MO(lower)"
adjust = "MO(adjust)"
ctl_ent = "MT(Enter, LCtrl)"
sft_z = "MT(Z, LShift)"
sft_sls = "MT(Slash, RShift)"
tild = "SHIFTED(Grave)"
exlm = "SHIFTED(Kc1)"
at = "SHIFTED(Kc2)"
hash = "SHIFTED(Kc3)"
dlr = "SHIFTED(Kc4)"
perc = "SHIFTED(Kc5)"
circ = "SHIFTED(Kc6)"
ampr = "SHIFTED(Kc7)"
astr = "SHIFTED(Kc8)"
lprn = "SHIFTED(Kc9)"
rprn = "SHIFTED(Kc0)"
unds = "SHIFTED(Minus)"
plus = "SHIFTED(Equal)"
lcbr = "SHIFTED(LeftBracket)"
rcbr = "SHIFTED(RightBracket)"
coln = "SHIFTED(Semicolon)"
pipe = "SHIFTED(Backslash)"
bt0 = "User0"
bt1 = "User1"
bt2 = "User2"
btnext = "User3"
btprev = "User4"
btclr = "User5"
usbble = "User6"

[[layer]]
name = "base"
keys = """
Q W E R T Y U I O P
A S D F G H J K L Quote
@sft_z X C V B N M Comma Dot @sft_sls
@upper @ctl_ent Space @lower
"""

[[layer]]
name = "upper"
keys = """
No LeftBracket @lcbr @rcbr No @circ @lprn @rprn RightBracket @tild
@exlm @at @hash @dlr @perc @ampr Minus Equal Backslash Grave
LShift LCtrl LAlt LGui No @astr @unds @plus @pipe Slash
_ _ Backspace @adjust
"""

[[layer]]
name = "lower"
keys = """
Insert Kc1 Kc2 Kc3 Minus Home PageDown PageUp End @coln
Delete Kc4 Kc5 Kc6 Dot Left Down Up Right Semicolon
CapsLock Kc7 Kc8 Kc9 Kc0 No RGui RAlt RCtrl RShift
Tab Escape _ _
"""

[[layer]]
name = "adjust"
keys = """
No F1 F2 F3 F4 @btclr @bt0 @bt1 @bt2 @usbble
No F5 F6 F7 F8 MediaNextTrack AudioVolDown AudioVolUp MediaPlayPause No
LShift F9 F10 F11 F12 PrintScreen RGui RAlt RCtrl RShift
_ _ _ _
"""

[ble]
enabled = true

[split]
connection = "ble"

[split.central]
rows = 4
cols = 5
row_offset = 0
col_offset = 0
[split.central.matrix]
matrix_type = "direct_pin"
direct_pin_low_active = true
direct_pins = [
    ["P0_09", "P0_02", "P0_29", "P0_31", "P0_30"],
    ["P1_13", "P0_03", "P0_28", "P1_11", "P0_06"],
    ["P0_15", "P0_17", "P0_20", "P0_13", "P0_24"],
    ["P0_10", "P1_06", "_", "_", "_" ]
]

[[split.peripheral]]
rows = 4
cols = 5
row_offset = 4
col_offset = 0

[split.peripheral.matrix]
matrix_type = "direct_pin"
direct_pin_low_active = true
direct_pins = [
    ["P0_09", "P0_02", "P0_29", "P0_31", "P0_30"],
    ["P1_13", "P0_03", "P0_28", "P1_11", "P0_06"],
    ["P0_15", "P0_17", "P0_20", "P0_13", "P0_24"],
    ["P0_10", "P1_06", "_", "_", "_" ]
]
